<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mencore AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#050d1a;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
}

h1{color:#00ffc3;}

input, button{
    padding:10px;
    margin:10px;
}

button{
    background:#00ffc3;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.box{
    border:2px solid #00ffc3;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

#status{color:yellow;}
</style>
</head>

<body>

<h1>🟢 Mencore AI PRO Dashboard</h1>

<!-- NEW: WHATSAPP LINK INPUT -->
<input type="text" id="linkInput" placeholder="Paste WhatsApp post link here">

<br>

<input type="file" id="imageInput">

<br>

<button onclick="scanImage()">⚡ SCAN IMAGE</button>

<div id="status">Waiting...</div>

<div class="box" id="result"></div>

<canvas id="chart"></canvas>

<script>

let chartInstance;

async function scanImage(){

    const file = document.getElementById("imageInput").files[0];
    const link = document.getElementById("linkInput").value;

    if(!file){
        alert("Upload screenshot!");
        return;
    }

    document.getElementById("status").innerText = "⚡ Ultra AI scanning...";

    const { data:{ text } } = await Tesseract.recognize(file, 'eng');

    console.log("RAW OCR:", text);

    analyze(text, link);
}

function analyze(text, link){

    text = text.replace(/\n/g, " ");

    // GET ALL NUMBERS
    let numbers = text.match(/\d+/g)?.map(Number) || [];

    console.log("Numbers:", numbers);

    /*
    EXPECTED FORMAT:
    [TOTAL, LOVE, LIKE, LAUGH, WOW, PRAY, SAD]
    */

    let total=0, love=0, like=0, laugh=0, wow=0, pray=0, sad=0;

    // SMART DETECTION
    if(numbers.length >= 7){

        // Find biggest number = TOTAL
        total = Math.max(...numbers);

        // Remove total from list
        numbers.splice(numbers.indexOf(total),1);

        // Sort remaining descending
        numbers.sort((a,b)=>b-a);

        // Assign values
        love = numbers[0] || 0;
        like = numbers[1] || 0;
        laugh = numbers[2] || 0;
        wow = numbers[3] || 0;
        pray = numbers[4] || 0;
        sad = numbers[5] || 0;
    }

    // FALLBACK
    if(total === 0){
        total = love + like + laugh + wow + pray + sad;
    }

    // VALIDATION FIX
    let sum = love+like+laugh+wow+pray+sad;

    if(sum > total){
        total = sum;
    }

    // LOVE %
    let lovePercent = total ? (love / total) * 100 : 0;

    // BOT RULE
    let verdict = lovePercent >= 80
        ? "⚠️ BOT REACTION DETECTED"
        : "✅ ORGANIC / MIXED";

    // OUTPUT
    document.getElementById("result").innerHTML = `
    <h3>📊 AI Analysis</h3>

    🔗 Link: ${link || "Not provided"}<br><br>

    Total: <b>${total}</b><br><br>

    ❤️ ${love} |
    👍 ${like} |
    😂 ${laugh} |
    😮 ${wow} |
    🙏 ${pray} |
    😢 ${sad}<br><br>

    ❤️ Love %: ${lovePercent.toFixed(2)}%<br><br>

    <b>${verdict}</b>
    `;

    drawChart(love, like, laugh, wow, sad, pray);

    document.getElementById("status").innerText = "✅ Scan Complete";
}

function drawChart(love, like, laugh, wow, sad, pray){

    const ctx = document.getElementById('chart');

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['❤️','👍','😂','😮','😢','🙏'],
            datasets: [{
                label: 'Reactions',
                data: [love, like, laugh, wow, sad, pray]
            }]
        }
    });
}

</script>

</body>
</html>
