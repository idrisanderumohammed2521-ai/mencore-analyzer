<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mencore AI Analyzer</title>

<style>
body {
    background: black;
    color: #00ff9c;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    border: 1px solid #00ff9c;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px #00ff9c;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: #00ff9c;
    border: 1px solid #00ff9c;
    border-radius: 5px;
}

button {
    cursor: pointer;
    font-weight: bold;
}

#terminal {
    margin-top: 15px;
    font-size: 13px;
    min-height: 120px;
}

#result {
    margin-top: 15px;
}

.bar {
    height: 8px;
    background: #00ff9c;
    width: 0%;
    margin-top: 10px;
    transition: width 0.4s;
}

</style>
</head>

<body>

<div class="container">
    <h2>🟢 Mencore AI Analyzer</h2>

    <input type="text" id="link" placeholder="Enter target link">
    <input type="file" id="image">

    <button onclick="analyze()">INITIATE SCAN</button>

    <div id="terminal"></div>
    <div class="bar" id="bar"></div>
    <div id="result"></div>
</div>

<script>

function typeLine(text, delay){
    return new Promise(resolve=>{
        setTimeout(()=>{
            let terminal = document.getElementById("terminal");
            terminal.innerHTML += text + "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            resolve();
        }, delay);
    });
}

async function analyze(){
    let link = document.getElementById("link").value;
    let file = document.getElementById("image").files[0];
    let bar = document.getElementById("bar");
    let result = document.getElementById("result");
    let terminal = document.getElementById("terminal");

    if(!link || !file){
        alert("Enter link and upload image");
        return;
    }

    terminal.innerHTML = "";
    result.innerHTML = "";
    bar.style.width = "0%";

    await typeLine("> Initializing AI core...", 500);
    bar.style.width = "20%";

    await typeLine("> Scanning image data...", 800);
    bar.style.width = "40%";

    await typeLine("> Extracting emoji reactions...", 800);
    bar.style.width = "60%";

    await typeLine("> Detecting bot patterns...", 800);
    bar.style.width = "80%";

    await typeLine("> Finalizing results...", 800);
    bar.style.width = "100%";

    // Fake emoji counts
    let like = Math.floor(Math.random()*500);
    let love = Math.floor(Math.random()*300);
    let fire = Math.floor(Math.random()*200);

    let score = Math.floor(Math.random()*100);

    let verdict = "";

    if(score > 70){
        verdict = "⚠️ BOT ACTIVITY DETECTED";
    } else if(score > 40){
        verdict = "🤔 SUSPICIOUS ACTIVITY";
    } else {
        verdict = "✅ REAL ENGAGEMENT";
    }

    result.innerHTML = `
        <h3>${verdict}</h3>
        AI Confidence: ${score}%<br><br>
        👍 Likes: ${like}<br>
        ❤️ Love: ${love}<br>
        🔥 Fire: ${fire}
    `;
}

</script>

</body>
</html>
