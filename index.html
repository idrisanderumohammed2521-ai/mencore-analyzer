<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Mencore Smart Bot Detector</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b1c2c;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: orange; }

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: orange;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

#result {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🔥 Mini Mencore Smart Detector</h1>

<input type="text" id="link" placeholder="Paste WhatsApp Channel Link">

<textarea id="manualInput" placeholder="Example: ❤️ 758 👍 323 😂 113"></textarea>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<button onclick="analyzeManual()">Analyze Manual</button>
<button onclick="analyzeImage()">Analyze Image</button>

<div id="result"></div>

<script>

// ================= EMOJI MAP =================
const emojiMap = {
    "❤️": "love",
    "❤": "love",
    "👍": "like",
    "😂": "laugh",
    "😮": "wow",
    "🙏": "pray",
    "😢": "sad",
    "😭": "cry"
};

// ================= MANUAL =================
function analyzeManual() {
    let input = document.getElementById("manualInput").value;

    if (!input) {
        alert("Enter reactions");
        return;
    }

    processText(input);
}

// ================= IMAGE =================
async function analyzeImage() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Upload image");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Scanning image...";

    const { data: { text } } = await Tesseract.recognize(file, 'eng');

    console.log(text);

    processText(text);
}

// ================= CORE PROCESS =================
function processText(text) {

    let reactions = {};
    let total = 0;

    // Match emoji + number pairs
    const matches = text.match(/([❤️❤👍😂😮🙏😢😭])\s*(\d+)/g);

    if (!matches) {
        document.getElementById("result").innerHTML = "❌ Couldn't detect emoji values";
        return;
    }

    matches.forEach(item => {
        let emoji = item.match(/[❤️❤👍😂😮🙏😢😭]/)[0];
        let value = parseInt(item.match(/\d+/)[0]);

        reactions[emoji] = value;
        total += value;
    });

    let love = reactions["❤️"] || reactions["❤"] || 0;

    let percentage = (love / total) * 100;

    let result = "";
    let confidence = "";

    // ===== YOUR RULE =====
    if (percentage >= 60) {
        result = "⚠️ BOT DETECTED";
        confidence = percentage.toFixed(2) + "%";
    } else {
        result = "✅ REAL ENGAGEMENT";
        confidence = (100 - percentage).toFixed(2) + "%";
    }

    document.getElementById("result").innerHTML = `
        <p><b>WhatsApp Link:</b> ${document.getElementById("link").value || "N/A"}</p>
        <p><b>Total:</b> ${total}</p>
        <p><b>❤️ Love:</b> ${love}</p>
        <p><b>Love %:</b> ${percentage.toFixed(2)}%</p>
        <p><b>Result:</b> ${result}</p>
        <p><b>Confidence:</b> ${confidence}</p>
    `;
}

</script>

</body>
</html>
