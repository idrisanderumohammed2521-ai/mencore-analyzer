<script>
function analyze(){
    let link = document.getElementById("link").value;
    let image = document.getElementById("image").files[0];

    if(link === "" || !image){
        alert("Please enter link and image");
        return;
    }

    document.getElementById("result").innerHTML = "🔍 Scanning for bot activity...";

    setTimeout(() => {

        // Simulated AI detection
        let randomScore = Math.floor(Math.random() * 100);

        let resultText = "";

        if(randomScore > 70){
            resultText = "⚠️ High Bot Activity Detected 🤖<br>Reactions appear artificially boosted.";
        } 
        else if(randomScore > 40){
            resultText = "⚠️ Suspicious Activity Detected 🤔<br>Some reactions may be from bots.";
        } 
        else {
            resultText = "✅ Authentic Engagement 👍<br>Reactions appear natural and real.";
        }

        document.getElementById("result").innerHTML =
        "<b>AI Confidence Score:</b> " + randomScore + "%<br><br>" + resultText;

    }, 2000);
}
</script>
