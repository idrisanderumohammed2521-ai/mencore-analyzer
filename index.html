<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mencore AI Dashboard</title>

<!-- OCR Library -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#050d1a;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
    padding:20px;
}

h1{
    color:#00ffc3;
}

.box{
    border:2px solid #00ffc3;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

button{
    background:#00ffc3;
    border:none;
    padding:15px;
    font-weight:bold;
    cursor:pointer;
}

#status{
    color:yellow;
    margin-top:10px;
}

canvas{
    background:#111;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🟢 Mencore AI Dashboard</h1>

<input type="file" id="imageInput"><br><br>

<button onclick="scanImage()">⚡ SCAN IMAGE</button>

<div id="status">Waiting...</div>

<div class="box" id="result"></div>

<canvas id="chart"></canvas>

<script>

async function scanImage(){
    const file = document.getElementById("imageInput").files[0];
    if(!file){
        alert("Upload image first!");
        return;
    }

    document.getElementById("status").innerText = "⚡ Scanning with Ultra AI...";

    const { data:{ text } } = await Tesseract.recognize(
        file,
        'eng',
        {
            logger: m => console.log(m)
        }
    );

    console.log(text);

    analyze(text);
}

function analyze(text){

    // CLEAN TEXT
    text = text.replace(/\n/g, " ");

    // EXTRACT TOTAL REACTIONS
    let totalMatch = text.match(/(\d+)\s*reactions/i);
    let total = totalMatch ? parseInt(totalMatch[1]) : 0;

    // EXTRACT EMOJIS
    let love = extract(text, "❤️") || extract(text, "❤");
    let like = extract(text, "👍");
    let laugh = extract(text, "😂");
    let wow = extract(text, "😮");
    let sad = extract(text, "😢");
    let pray = extract(text, "🙏");

    // FIX: If OCR fails, estimate from numbers
    if(total === 0){
        total = love + like + laugh + wow + sad + pray;
    }

    // CALCULATE %
    let lovePercent = total ? (love / total) * 100 : 0;

    // BOT DETECTION RULE
    let verdict = "";
    if(lovePercent >= 80){
        verdict = "⚠️ BOT REACTION DETECTED (Love >= 80%)";
    }else{
        verdict = "✅ ORGANIC / MIXED REACTIONS";
    }

    // SHOW RESULT
    document.getElementById("result").innerHTML = `
    <h3>📊 Analysis Result</h3>
    Total Reactions: <b>${total}</b><br><br>

    ❤️ Love: ${love}<br>
    👍 Like: ${like}<br>
    😂 Laugh: ${laugh}<br>
    😮 Wow: ${wow}<br>
    😢 Sad: ${sad}<br>
    🙏 Pray: ${pray}<br><br>

    ❤️ Love %: ${lovePercent.toFixed(2)}%<br><br>

    <b>${verdict}</b>
    `;

    drawChart(love, like, laugh, wow, sad, pray);
}

// SMART EMOJI EXTRACTOR
function extract(text, emoji){
    let regex = new RegExp(emoji + "\\s*(\\d+)");
    let match = text.match(regex);
    return match ? parseInt(match[1]) : 0;
}

// GRAPH
function drawChart(love, like, laugh, wow, sad, pray){
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['❤️','👍','😂','😮','😢','🙏'],
            datasets: [{
                label: 'Reactions',
                data: [love, like, laugh, wow, sad, pray]
            }]
        }
    });
}

</script>

</body>
</html>
